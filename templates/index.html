<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Roon Helper Tasks</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 2rem; }
        form { margin-bottom: 1.5rem; }
        table { border-collapse: collapse; width: 100%; max-width: 800px; }
        th, td { border: 1px solid #ccc; padding: 0.5rem; text-align: left; }
        th { background: #f2f2f2; }
        .actions { margin-top: 2rem; }
        .hidden { display: none; }
        .tag-editor { border: 1px solid #ccc; padding: 1rem; margin-top: 1rem; }
        .batch-controls { margin-bottom: 0.75rem; }
        .badge { padding: 0.2rem 0.5rem; border-radius: 0.3rem; background: #eef; }
        .status-ok { background: #e6ffed; color: #0b6b2f; }
        .status-error { background: #ffe6e6; color: #8c1a1a; }
        .status-warning { background: #fff6e6; color: #8c5a00; }
        .event-log { font-size: 0.9rem; line-height: 1.3; }
        .stuck { border-left: 4px solid #ffb347; }
        .section-card { border: 1px solid #ddd; padding: 1rem; margin-top: 1rem; border-radius: 0.3rem; }
    </style>
</head>
<body>
    <h1>Resumable Upload Demo</h1>
    <form id="create-task">
        <label for="name">Task name:</label>
        <input id="name" name="name" required>
        <label for="file-input">Files:</label>
        <input id="file-input" type="file" webkitdirectory directory multiple required>
        <button type="submit">Create & Upload</button>
    </form>

    <section>
        <h2>Existing tasks</h2>
        <div id="health" class="section-card"></div>
        <div class="section-card">
            <h3>Мониторинг задач</h3>
            <table>
                <thead>
                    <tr><th>ID</th><th>Name</th><th>Status</th><th>Last event</th><th>Last event at</th><th>Recent events</th><th>Debug</th></tr>
                </thead>
                <tbody id="overview-body"></tbody>
            </table>
        </div>
    </section>

    <section>
        <h2>Uploads</h2>
        <div id="uploads"></div>
    </section>

    <section class="actions">
        <h2>Actions</h2>
        <div id="password-actions"></div>
        <div id="tag-actions"></div>
        <div id="tag-editor" class="tag-editor hidden">
            <h3>Правка тегов для задачи <span id="tag-task-id"></span></h3>
            <div class="batch-controls">
                <label>Batch Artist: <input id="batch-artist"></label>
                <label>Batch Album: <input id="batch-album"></label>
                <label>Batch Year: <input id="batch-year"></label>
                <button id="apply-batch" type="button">Применить к таблице</button>
            </div>
            <table id="tag-table">
                <thead>
                    <tr><th>Путь</th><th>Title</th><th>Artist</th><th>Album</th><th>Year</th></tr>
                </thead>
                <tbody></tbody>
            </table>
            <div style="margin-top: 0.75rem;">
                <button id="submit-tags" type="button">Сохранить теги</button>
                <button id="cancel-tags" type="button">Отмена</button>
            </div>
        </div>
    </section>

    <script>
        const uploadsContainer = document.getElementById('uploads');
        let tasksData = {{ tasks|tojson }};
        const passwordActions = document.getElementById('password-actions');
        const tagActions = document.getElementById('tag-actions');
        const tagEditor = document.getElementById('tag-editor');
        const tagTableBody = document.querySelector('#tag-table tbody');
        const tagTaskId = document.getElementById('tag-task-id');
        const batchArtist = document.getElementById('batch-artist');
        const batchAlbum = document.getElementById('batch-album');
        const batchYear = document.getElementById('batch-year');

        function createProgressEntry(file) {
            const wrapper = document.createElement('div');
            wrapper.innerHTML = `<strong>${file.name}</strong> <span class="progress">0%</span>`;
            return wrapper;
        }

        async function uploadFile(taskId, file, progressEl) {
            const relativePath = file.webkitRelativePath || file.name;
            const registerResponse = await fetch(`/api/tasks/${taskId}/files`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    relative_path: relativePath,
                    size_bytes: file.size,
                    original_name: file.name
                })
            });

            if (!registerResponse.ok) {
                throw new Error(`Register failed: ${await registerResponse.text()}`);
            }
            const { file_id: fileId, max_chunk_bytes: maxChunk } = await registerResponse.json();
            let offset = 0;
            while (offset < file.size) {
                const chunk = file.slice(offset, offset + maxChunk);
                const chunkResponse = await fetch(`/api/tasks/${taskId}/files/${fileId}/chunks`, {
                    method: 'POST',
                    headers: {
                        'Content-Range': `bytes ${offset}-${offset + chunk.size - 1}/${file.size}`
                    },
                    body: chunk
                });

                if (!chunkResponse.ok) {
                    throw new Error(`Chunk failed: ${await chunkResponse.text()}`);
                }
                const chunkResult = await chunkResponse.json();
                offset = chunkResult.next_offset;
                const percent = Math.floor((offset / file.size) * 100);
                progressEl.querySelector('.progress').textContent = `${percent}%`;
            }

            const finalizeResponse = await fetch(`/api/tasks/${taskId}/files/${fileId}/finalize`, {
                method: 'POST'
            });
            if (!finalizeResponse.ok) {
                throw new Error(`Finalize failed: ${await finalizeResponse.text()}`);
            }
            progressEl.querySelector('.progress').textContent = 'Done';
        }

        document.getElementById('create-task').addEventListener('submit', async (event) => {
            event.preventDefault();
            const nameInput = document.getElementById('name');
            const filesInput = document.getElementById('file-input');
            if (!filesInput.files.length) {
                alert('Select at least one file.');
                return;
            }

            const payload = { name: nameInput.value };
            const response = await fetch('/api/tasks', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            if (!response.ok) {
                alert('Failed to create task');
                return;
            }
            const task = await response.json();
            const files = Array.from(filesInput.files);
            uploadsContainer.innerHTML = '';
            for (const file of files) {
                const progressEl = createProgressEntry(file);
                uploadsContainer.appendChild(progressEl);
                try {
                    await uploadFile(task.id, file, progressEl);
                } catch (err) {
                    progressEl.querySelector('.progress').textContent = `Error: ${err.message}`;
                    break;
                }
            }
            window.location.reload();
        });

        function renderPasswordActions(tasks) {
            passwordActions.innerHTML = '';
            const waiting = tasks.filter(task => task.status === 'NEED_PASSWORD');
            waiting.forEach(task => {
                const form = document.createElement('form');
                form.innerHTML = `
                    <h3>Задача ${task.id}: требуется пароль</h3>
                    <input type="password" name="password" placeholder="Введите пароль" required>
                    <button type="submit">Продолжить</button>
                `;
                form.addEventListener('submit', async (evt) => {
                    evt.preventDefault();
                    const password = form.querySelector('input[name="password"]').value;
                    const response = await fetch(`/api/tasks/${task.id}/password`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ password })
                    });
                    if (!response.ok) {
                        alert('Не удалось отправить пароль');
                        return;
                    }
                    alert('Пароль принят, обработка возобновлена');
                    window.location.reload();
                });
                passwordActions.appendChild(form);
            });
        }

        function renderTagActions(tasks) {
            tagActions.innerHTML = '';
            const waiting = tasks.filter(task => task.status === 'NEED_TAGS');
            waiting.forEach(task => {
                const wrapper = document.createElement('div');
                wrapper.innerHTML = `
                    <h3>Задача ${task.id}: требуется правка тегов</h3>
                    <button type="button">Открыть редактор тегов</button>
                `;
                const openButton = wrapper.querySelector('button');
                openButton.addEventListener('click', () => loadTags(task.id));
                tagActions.appendChild(wrapper);
            });
        }

        function populateTagEditor(taskId, tracks) {
            tagTaskId.textContent = taskId;
            tagTableBody.innerHTML = '';
            tracks.forEach(track => {
                const row = document.createElement('tr');
                row.dataset.path = track.path;
                row.innerHTML = `
                    <td>${track.path}</td>
                    <td><input type="text" value="${track.title || ''}"></td>
                    <td><input type="text" value="${track.artist || ''}"></td>
                    <td><input type="text" value="${track.album || ''}"></td>
                    <td><input type="text" value="${track.year || ''}"></td>
                `;
                tagTableBody.appendChild(row);
            });
            tagEditor.classList.remove('hidden');
        }

        async function loadTags(taskId) {
            const response = await fetch(`/api/tasks/${taskId}/tags`);
            if (!response.ok) {
                alert('Не удалось загрузить теги');
                return;
            }
            const payload = await response.json();
            populateTagEditor(taskId, payload.tracks);
        }

        document.getElementById('cancel-tags').addEventListener('click', () => {
            tagEditor.classList.add('hidden');
            tagTableBody.innerHTML = '';
        });

        document.getElementById('apply-batch').addEventListener('click', () => {
            const rows = Array.from(tagTableBody.querySelectorAll('tr'));
            rows.forEach(row => {
                const cells = row.querySelectorAll('input');
                if (batchArtist.value) { cells[1].value = batchArtist.value; }
                if (batchAlbum.value) { cells[2].value = batchAlbum.value; }
                if (batchYear.value) { cells[3].value = batchYear.value; }
            });
        });

        document.getElementById('submit-tags').addEventListener('click', async () => {
            const rows = Array.from(tagTableBody.querySelectorAll('tr'));
            const taskId = tagTaskId.textContent;
            const tracks = rows.map(row => {
                const inputs = row.querySelectorAll('input');
                return {
                    path: row.dataset.path,
                    title: inputs[0].value || null,
                    artist: inputs[1].value || null,
                    album: inputs[2].value || null,
                    year: inputs[3].value || null,
                };
            });
            const payload = {
                tracks,
                batch_artist: batchArtist.value || null,
                batch_album: batchAlbum.value || null,
                batch_year: batchYear.value || null,
            };
            const response = await fetch(`/api/tasks/${taskId}/tags`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if (!response.ok) {
                alert('Не удалось сохранить теги');
                return;
            }
            alert('Теги обновлены, обработка продолжается');
            window.location.reload();
        });

        function statusBadge(status) {
            const span = document.createElement('span');
            span.textContent = status;
            span.classList.add('badge');
            if (['ERROR', 'FAILED'].includes(status)) {
                span.classList.add('status-error');
            } else if (['NEED_PASSWORD', 'NEED_TAGS', 'CANCELLED'].includes(status)) {
                span.classList.add('status-warning');
            } else if (['DONE', 'DONE_WITH_DUPLICATES', 'COMPLETED'].includes(status)) {
                span.classList.add('status-ok');
            }
            return span;
        }

        function renderOverview(rows) {
            const body = document.getElementById('overview-body');
            body.innerHTML = '';
            rows.forEach(entry => {
                const tr = document.createElement('tr');
                if (entry.is_stuck) {
                    tr.classList.add('stuck');
                }
                const lastEvent = entry.recent_events.at(-1);
                tr.innerHTML = `
                    <td>${entry.task.id}</td>
                    <td>${entry.task.name}</td>
                    <td></td>
                    <td>${lastEvent ? lastEvent.event : '—'}</td>
                    <td>${entry.task.last_event_at || '—'}</td>
                    <td class="event-log"></td>
                    <td><a href="/api/tasks/${entry.task.id}/debug" target="_blank">/debug</a></td>
                `;
                tr.querySelector('td:nth-child(3)').appendChild(statusBadge(entry.task.status));
                const eventsCell = tr.querySelector('.event-log');
                eventsCell.innerHTML = entry.recent_events
                    .map(evt => {
                        const lower = evt.event.toLowerCase();
                        const cls = (lower.includes('fail') || lower.includes('error')) ? 'status-error badge' : '';
                        return `<div class="${cls}">${evt.event} <small>${evt.created_at}</small></div>`;
                    })
                    .join('');
                body.appendChild(tr);
            });
        }

        async function loadOverview() {
            try {
                const response = await fetch('/api/tasks/overview');
                if (!response.ok) {
                    throw new Error('Не удалось загрузить статус задач');
                }
                const payload = await response.json();
                renderOverview(payload);
                tasksData = payload.map(item => item.task);
                renderPasswordActions(tasksData);
                renderTagActions(tasksData);
            } catch (err) {
                console.error(err);
            }
        }

        async function loadHealth() {
            const container = document.getElementById('health');
            try {
                const response = await fetch('/health');
                if (!response.ok) {
                    throw new Error('healthcheck failed');
                }
                const payload = await response.json();
                container.innerHTML = `
                    <strong>API health:</strong> ${payload.status}<br>
                    <strong>Worker:</strong> ${payload.worker_status}${payload.worker_heartbeat_at ? ` (last beat ${payload.worker_heartbeat_at})` : ' (no heartbeat yet)'}
                `;
                if (payload.worker_status !== 'ok') {
                    container.classList.add('status-warning');
                }
            } catch (err) {
                container.innerHTML = `Ошибка получения статуса: ${err.message}`;
                container.classList.add('status-error');
            }
        }

        renderPasswordActions(tasksData);
        renderTagActions(tasksData);
        loadOverview();
        loadHealth();
    </script>
</body>
</html>
